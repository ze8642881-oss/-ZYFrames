<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details — Creative Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="details.css" />
</head>
<body>

  <div class="scanline-overlay" aria-hidden="true"></div>

  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-name">ZYFrames</span>
      </a>
      <a href="index.html#thumbnails" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Portfolio
      </a>
    </div>
  </nav>

  <section class="detail-section" id="detailSection">
    <div class="detail-container reveal-item" id="detailContainer">
      <div class="detail-image-wrap">
        <img id="detailImage" src="" alt="" class="detail-image" />
        <div class="detail-placeholder" id="detailPlaceholder" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      </div>
      <div class="detail-info">
        <p class="detail-category" id="detailCategory"></p>
        <h1 class="detail-title" id="detailTitle"></h1>
        <p class="detail-description" id="detailDescription"></p>
        <a href="index.html#thumbnails" class="btn-cta">
          <span>BACK TO THUMBNAILS</span>
        </a>
      </div>
    </div>

    <div class="detail-not-found" id="detailNotFound">
      <p class="detail-not-found-text">Project not found.</p>
      <a href="index.html" class="btn-cta"><span>GO HOME</span></a>
    </div>
  </section>

  <script src="details.js"></script>
</body>
</html>
